<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClikCoin</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: white; font-family: Arial; overflow: hidden; }

/* TAB ATAS KAYAK TIKTOK */
.top-nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 10;
  font-size: 16px;
}
.top-nav span { opacity: 0.6; }
.top-nav span.active { 
  opacity: 1; 
  font-weight: bold; 
  border-bottom: 2px solid white; 
  padding-bottom: 5px;
}
.live-btn { 
  background: red; 
  padding: 4px 8px; 
  border-radius: 5px; 
  font-size: 12px; 
  font-weight: bold;
}

/* FEED VIDEO FULL LAYAR */
.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}
.video-item {
  height: 100vh;
  width: 100vw;
  position: relative;
  scroll-snap-align: start;
  background: #000;
}
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ICON KAN KAYAK TIKTOK */
.right-icons {
  position: absolute;
  right: 12px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 25px;
  z-index: 5;
}
.profile-pic {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid white;
  position: relative;
  background: gray;
}
.profile-pic .plus {
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  border: 2px solid black;
}
.icon-item {
  text-align: center;
  font-size: 28px;
}
.icon-item p {
  font-size: 12px;
  margin-top: 4px;
}

/* DESKRIPSI BAWAH VIDEO */
.desc {
  position: absolute;
  bottom: 80px;
  left: 15px;
  right: 70px;
  z-index: 5;
}
.desc h3 { font-size: 16px; margin-bottom: 5px; }
.desc p { font-size: 14px; opacity: 0.9; }

/* MENU BAWAH */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 10;
}
.nav-btn {
  background: none;
  border: none;
  color: white;
  text-align: center;
  font-size: 11px;
}
.nav-btn .icon { font-size: 24px; display: block; }
.nav-btn.active { color: white; }
.plus-btn {
  background: white;
  color: black;
  width: 48px;
  height: 28px;
  border-radius: 8px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* IKLAN 5 DETIK */
.ad-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.95);
  color: gold;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  font-size: 22px;
  z-index: 999;
  display: none;
}
.admin-btn {
  position: fixed;
  top: 60px;
  left: 10px;
  background: red;
  color: white;
  padding: 6px 10px;
  border-radius: 20px;
  border: none;
  font-size: 11px;
  z-index: 999;
}
</style>
</head>
<body>

<!-- TAB ATAS -->
<div class="top-nav">
  <span class="live-btn">LIVE</span>
  <span>Nabire</span>
  <span>Teman</span>
  <span>Mengikuti</span>
  <span class="active">Saran</span>
  <span>🔍</span>
</div>

<button class="admin-btn" onclick="tambahVideo()">⚙️ Admin</button>

<!-- FEED VIDEO -->
<div class="feed" id="feed"></div>

<!-- IKLAN -->
<div class="ad-box" id="adBox">
  <p>📢 CLIKCOIN ADS</p>
  <p>Skip <span id="detik">5</span> detik</p>
  <small>Kreator +30 Koin</small>
</div>

<!-- MENU BAWAH -->
<div class="bottom-nav">
  <button class="nav-btn active">
    <span class="icon">🏠</span>
    Beranda
  </button>
  <button class="nav-btn" onclick="alert('Toko - isi link afiliasi lu di code')">
    <span class="icon">🛒</span>
    Toko
  </button>
  <button class="nav-btn plus-btn" onclick="tambahVideo()">+</button>
  <button class="nav-btn" onclick="alert('Kotak Masuk kosong')">
    <span class="icon">💬</span>
    Kotak Masuk
  </button>
  <button class="nav-btn" onclick="alert('Saldo: ' + saldo + ' Koin')">
    <span class="icon">👤</span>
    Profil
  </button>
</div>

<script>
// EDIT LINK VIDEO LU DISINI GOB
let videos = [
  'https://drive.google.com/uc?export=download&id=1xVIDEO1 | Hzeelth Demonic | Xiaoxiao gerakan 3000 petir #donghua #fyp',
  'https://drive.google.com/uc?export=download&id=1xVIDEO2 | ClikCoin Test | Swipe ke atas buat video berikutnya'
];

let saldo = parseInt(localStorage.getItem('clikcoin_saldo') || '0');
let videoKe = 0;

// LOAD VIDEO + ICON KAN
function loadFeed() {
  let feed = document.getElementById('feed');
  feed.innerHTML = '';
  videos.forEach(v => {
    let [link, judul, desc] = v.split(' | ');
    feed.innerHTML += `
      <div class="video-item">
        <video src="${link}" playsinline loop></video>
        
        <div class="right-icons">
          <div class="profile-pic">
            <div class="plus">+</div>
          </div>
          <div class="icon-item">❤️<p>18,6 rb</p></div>
          <div class="icon-item">💬<p>245</p></div>
          <div class="icon-item">🔖<p>1.046</p></div>
          <div class="icon-item">↗️<p>195</p></div>
        </div>
        
        <div class="desc">
          <h3>${judul}</h3>
          <p>${desc}</p>
        </div>
      </div>
    `;
  });
}
loadFeed();

// AUTO PLAY + IKLAN 5 DETIK
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      document.querySelectorAll('video').forEach(v => v.pause());
      entry.target.play();
      videoKe++;
      if(videoKe % 3 === 0) munculIklan();
    } else {
      entry.target.pause();
    }
  });
}, { threshold: 0.6 });
document.querySelectorAll('video').forEach(v => observer.observe(v));

function munculIklan() {
  let ad = document.getElementById('adBox');
  ad.style.display = 'block';
  let d = 5;
  document.getElementById('detik').innerText = d;
  let t = setInterval(() => {
    d--;
    document.getElementById('detik').innerText = d;
    if(d < 0) {
      clearInterval(t);
      ad.style.display = 'none';
      saldo += 30;
      localStorage.setItem('clikcoin_saldo', saldo);
    }
  }, 1000);
}

// TAMBAH VIDEO
function tambahVideo() {
  let baru = prompt('Format: link.mp4 | Judul | Deskripsi\nContoh:\nhttps://drive.google.com/uc?export=download&id=xxx | Judul | #fyp');
  if(baru && baru.includes('.mp4')) {
    videos.push(baru);
    alert('Video ditambah! Refresh halaman');
    location.reload();
  }
}

// DAFTAR SERVICE WORKER BUAT PWA
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
