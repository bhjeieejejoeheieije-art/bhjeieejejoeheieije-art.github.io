 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClikCoin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:white; font-family:sans-serif; overflow:hidden; }
.video-item { height:100vh; width:100vw; position:relative; background:#000; }
video { width:100%; height:100%; object-fit:cover; }
.right-icons { position:absolute; right:12px; bottom:120px; display:flex; flex-direction:column; align-items:center; gap:28px; z-index:5; }
.profile-pic { width:47px; height:47px; border-radius:50%; border:2px solid white; background:#333; position:relative; }
.profile-pic .plus { position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); background:#fe2c55; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; }
.icon-item { text-align:center; font-size:26px; }
.icon-item p { font-size:11px; margin-top:4px; font-weight:600; }
.desc { position:absolute; bottom:90px; left:15px; right:75px; z-index:5; }
.desc h3 { font-size:16px; margin-bottom:6px; }
.desc p { font-size:14px; }

/* MENU BAWAH */
.bottom-nav { position:fixed; bottom:0; width:100%; height:60px; background:rgba(0,0,0,0.95); display:flex; justify-content:space-around; align-items:center; z-index:100; border-top:1px solid #222; }
.nav-btn { background:none; border:none; color:#888; text-align:center; font-size:11px; }
.nav-btn .icon { font-size:26px; display:block; margin-bottom:2px; }
.plus-btn { background:linear-gradient(45deg, #00f2ea, #fe2c55); width:50px; height:32px; border-radius:10px; font-size:24px; font-weight:bold; color:white; border:none; }

/* POPUP UPDATE VIDEO - INI KUNCINYA GOB */
#popup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center; }
.popup-box { background:#1a1a1a; padding:25px; border-radius:15px; width:90%; max-width:400px; border:2px solid #fe2c55; }
.popup-box h3 { margin-bottom:15px; text-align:center; color:#fe2c55; }
.popup-box input { width:100%; padding:14px; margin:8px 0; background:#333; border:1px solid #555; color:white; border-radius:8px; font-size:16px; }
.popup-box button { width:48%; padding:14px; border:none; border-radius:8px; font-weight:bold; font-size:16px; margin-top:12px; }
.btn-batal { background:#555; color:white; }
.btn-simpan { background:#fe2c55; color:white; }
</style>
</head>
<body>

<!-- VIDEO UTAMA -->
<div class="video-item" id="videoBox">
  <video id="vid" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" autoplay loop muted playsinline></video>
  
  <div class="right-icons">
    <div class="profile-pic"><div class="plus">+</div></div>
    <div class="icon-item">❤️<p>18,6 rb</p></div>
    <div class="icon-item">💬<p>245</p></div>
    <div class="icon-item">🔖<p>1.046</p></div>
    <div class="icon-item">↗️<p>195</p></div>
  </div>
  
  <div class="desc">
    <h3 id="judul">懂Hzeelth`Demonic</h3>
    <p id="deskripsi">Xiaoxiao gerakan 3000 petir #donghua #fyp</p>
  </div>
</div>

<!-- POPUP UPDATE VIDEO -->
<div id="popup">
  <div class="popup-box">
    <h3>📤 UPDATE VIDEO BARU</h3>
    <input type="text" id="inputLink" placeholder="1. Tempel link .mp4 di sini">
    <input type="text" id="inputJudul" placeholder="2. Judul video">
    <input type="text" id="inputDesc" placeholder="3. Deskripsi #tag">
    <div style="display:flex; gap:10px; margin-top:5px;">
      <button class="btn-batal" onclick="tutupPopup()">Batal</button>
      <button class="btn-simpan" onclick="simpanVideo()">Simpan & Ganti</button>
    </div>
    <p style="font-size:11px; color:#aaa; margin-top:10px;">Note: Link harus .mp4. Google Drive harus diubah formatnya</p>
  </div>
</div>

<!-- MENU BAWAH -->
<div class="bottom-nav">
  <button class="nav-btn"><span class="icon">🏠</span>Beranda</button>
  <button class="nav-btn"><span class="icon">🛍️</span>Toko</button>
  <button class="plus-btn" onclick="bukaPopup()">+</button>
  <button class="nav-btn"><span class="icon">📥</span>Kotak Masuk</button>
  <button class="nav-btn"><span class="icon">👤</span>Profil</button>
</div>

<script>
// FUNGSI BUKA TUTUP POPUP - INI YG BIKIN BISA KETIK
function bukaPopup() {
  document.getElementById('popup').style.display = 'flex';
  document.getElementById('inputLink').focus(); // langsung aktifin keyboard
}
function tutupPopup() {
  document.getElementById('popup').style.display = 'none';
}

// FUNGSI GANTI VIDEO
function simpanVideo() {
  let link = document.getElementById('inputLink').value.trim();
  let judul = document.getElementById('inputJudul').value.trim();
  let desc = document.getElementById('inputDesc').value.trim();
  
  if(!link.includes('.mp4')) {
    alert('Gagal gob! Link harus ada .mp4 nya');
    return;
  }
  
  // Ganti video + teks
  document.getElementById('vid').src = link;
  document.getElementById('judul').innerText = judul || 'Video Baru';
  document.getElementById('deskripsi').innerText = desc || '#clikcoin';
  
  // Simpen ke HP biar gak ilang pas refresh
  localStorage.setItem('clikcoin_video', link+'|'+judul+'|'+desc);
  
  tutupPopup();
  alert('Berhasil! Video udah ganti gob 🔥');
}

// LOAD VIDEO TERAKHIR PAS BUKA
window.onload = function() {
  let data = localStorage.getItem('clikcoin_video');
  if(data) {
    let [link, judul, desc] = data.split('|');
    document.getElementById('vid').src = link;
    document.getElementById('judul').innerText = judul;
    document.getElementById('deskripsi').innerText = desc;
  }
}
</script>
</body>
</html>
